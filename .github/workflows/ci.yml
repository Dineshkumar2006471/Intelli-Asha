name: IntelliASHA CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run Linter (Code Quality Check)
      run: npm run lint

    - name: Run Type Check
      run: npx tsc --noEmit

    - name: Run Unit Tests
      run: npm test
        
    - name: Build Application
      run: npm run build
      env:
        VITE_FIREBASE_API_KEY: "ci-dummy-key"
        VITE_FIREBASE_AUTH_DOMAIN: "ci-dummy-domain"
        VITE_FIREBASE_PROJECT_ID: "ci-dummy-id"
        VITE_FIREBASE_STORAGE_BUCKET: "ci-dummy-bucket"
        VITE_FIREBASE_MESSAGING_SENDER_ID: "ci-dummy-sender"
        VITE_FIREBASE_APP_ID: "ci-dummy-app-id"
        VITE_GEMINI_API_KEY: "ci-dummy-gemini-key"
