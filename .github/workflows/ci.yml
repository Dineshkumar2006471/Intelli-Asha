name: IntelliASHA CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Ensure oxlint Linux binding is present
      if: matrix.node-version == '20.x'
      run: npm install --no-save @oxlint/binding-linux-x64-gnu
      
    - name: Run Linter (Code Quality Check)
      if: matrix.node-version == '20.x'
      run: npm run lint
      
    - name: Build Application
      run: npm run build
      env:
        VITE_FIREBASE_API_KEY: "dummy-key"
        VITE_FIREBASE_AUTH_DOMAIN: "dummy-domain"
        VITE_FIREBASE_PROJECT_ID: "dummy-id"
        VITE_FIREBASE_STORAGE_BUCKET: "dummy-bucket"
        VITE_FIREBASE_MESSAGING_SENDER_ID: "dummy-sender"
        VITE_FIREBASE_APP_ID: "dummy-app-id"
